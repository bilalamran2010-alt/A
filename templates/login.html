<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL TEAM - Premium License System</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #080710;
            --bg-card: rgba(18, 16, 35, 0.7);
            --accent-cyan: #00e5ff;
            --accent-purple: #9d5cff;
            --accent-blue: #2979ff;
            --text-main: #f1f0f7;
            --text-muted: #82809a;
            --border-color: rgba(255, 255, 255, 0.06);
            --danger: #ff1744;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-primary);
            background: radial-gradient(circle at center, #1a153b 0%, var(--bg-primary) 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .brand-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .app-icon {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-cyan) 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 25px rgba(157, 92, 255, 0.4);
        }

        .app-icon svg {
            width: 35px;
            height: 35px;
            fill: #ffffff;
        }

        .brand-container h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .brand-container p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .login-card {
            width: 100%;
            max-width: 390px;
            background: var(--bg-card);
            border-radius: 22px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 25px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        /* Flash Error Messages Node */
        .alert-error-node {
            background: rgba(255, 23, 68, 0.08);
            border: 1px solid rgba(255, 23, 68, 0.2);
            color: var(--danger);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            width: 18px;
            height: 18px;
            fill: #595675;
        }

        .input-field {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(10, 8, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--accent-cyan);
            background: rgba(14, 12, 28, 0.9);
        }

        .eye-icon {
            position: absolute;
            right: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .eye-icon svg {
            position: static;
            fill: #595675;
        }

        .btn-signin {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 20px rgba(157, 92, 255, 0.3);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-signin:hover {
            box-shadow: 0 7px 25px rgba(41, 121, 255, 0.4);
            transform: translateY(-1px);
        }

        .divider-text {
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            color: #3b3852;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 25px 0 20px 0;
        }

        .support-area {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00e676;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #00e676;
        }

        .support-link {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 600;
        }

        .support-link:hover {
            text-decoration: underline;
        }

        .footer-credits {
            margin-top: 30px;
            font-size: 11px;
            color: #3f3c56;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <div class="app-icon">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
        </div>
        <h1>LOL TEAM</h1>
        <p>Premium License System — Hardware Bound Node</p>
    </div>

    <div class="login-card">
        
        <!-- Jinja2 Flash Message Handler for Python Server -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert-error-node">⚠️ {{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/" id="loginForm">
            <!-- Hidden field for hardware session lock -->
            <input type="hidden" id="browser_fingerprint" name="browser_fingerprint">
            
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/></svg>
                    <input type="text" id="username" name="username" class="input-field" placeholder="Enter security handle" required autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" required>
                    <div class="eye-icon" onclick="togglePassword()">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-signin">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="white" style="position:static;"><path d="M10 17v-4H3v-2h7V7l5 5-5 5zm10 2H11v-2h9V5h-9V3h9c1.1 0 2 .9 2 2v14c0 1.1-.9 2-2 2z"/></svg>
                Authenticate Session
            </button>

            <div class="divider-text">Secure Area</div>

            <div class="support-area">
                <span class="status-dot"></span>
                <span>Need Access?</span>
                <a href="https://t.me/Rk28g" class="support-link" target="_blank">Contact Administration</a>
            </div>
        </form>
    </div>

    <div class="footer-credits">
        &copy; 2026 LOL TEAM &mdash; Hardware Enforced Matrix
    </div>

    <script>
        function togglePassword() {
            var x = document.getElementById("password");
            if (x.type === "password") {
                x.type = "text";
            } else {
                x.type = "password";
            }
        }

        function generateDeviceFingerprint() {
            const agent = navigator.userAgent;
            const screenW = window.screen.width;
            const screenH = window.screen.height;
            const bpc = window.screen.colorDepth;
            const str = `${agent}-${screenW}x${screenH}-${bpc}`;
            
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = (hash << 5) - hash + str.charCodeAt(i);
                hash |= 0;
            }
            document.getElementById('browser_fingerprint').value = 'WEB-' + Math.abs(hash);
        }

        window.onload = generateDeviceFingerprint;
    </script>
</body>
</html>
